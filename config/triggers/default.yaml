# 종목별 절대가격 매수/매도 트리거 — 데모/예시
#
# "삼성전자 7만원 이하면 매수, 9만원 이상이면 매도" 처럼 직접 정한 가격선.
# 현재가가 선을 건드리면 대시보드 '오늘의 액션'에 매수/매도 신호가 뜬다.
# 시스템은 신호까지만, 실제 매매는 사용자가 한다.
#
# ⚠️ 이 파일은 공개 저장소 예시다. 실제 트리거는 개인 투자정보이므로
#    서버에서 덮어쓰고 git-excluded로 관리한다(config/assets와 동일).
#
# 각 trigger:
#   asset_id   config/assets/default.yaml의 주식 자산 식별자
#   currency   가격 통화(KRW/USD) — 자산의 거래통화와 같아야 한다
#   buy_at     이 가격 이하면 매수 신호 (선택)
#   sell_at    이 가격 이상이면 매도 신호 (선택)
#   ※ buy_at/sell_at 중 최소 하나는 있어야 한다

triggers:
  - {asset_id: "KRX:005930", currency: KRW, buy_at: "70000", sell_at: "90000"}
  - {asset_id: "NASDAQ:AAPL", currency: USD, buy_at: "180", sell_at: "260"}
