# 종목별 절대가격 트리거 — 데모/예시
#
# 한 종목에 세 가지 가격선을 둘 수 있다(모두 선택, 최소 하나 필수):
#   buy_at          이 가격 이하면 매수
#   take_profit_at  이 가격 이상이면 매도(익절)
#   stop_loss_at    이 가격 이하면 매도(손절)
# 현재가가 선을 건드리면 '오늘의 액션'에 신호가 뜬다. 실제 매매는 사용자가 한다.
#
# 논리적 순서: stop_loss_at < buy_at < take_profit_at
#
# ⚠️ 이 파일은 공개 저장소 예시다. 실제 트리거는 개인 투자정보이므로
#    서버에서 덮어쓰고 git-excluded로 관리한다(config/assets와 동일).

