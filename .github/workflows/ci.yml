name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # 한글 PDF 렌더러 통합 테스트용 폰트
      - name: Install Korean font
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-nanum

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Typecheck (mypy strict)
        run: mypy src

      - name: Test (pytest)
        run: pytest -q
